<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#FF7A45">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Cooksy">
<title>Cooksy</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<style>
:root{
  --bg:#FFF7EE; --card:#FFFFFF; --ink:#33261D; --sub:#A08D80;
  --acc:#FF7A45; --acc2:#FFB84D; --green:#3FBF6F; --pink:#FF5D8F;
  --line:#F4E8DC; --r:20px;
  --shadow:0 6px 24px rgba(255,122,69,.10);
  --grad:linear-gradient(135deg,#FF7A45,#FF5D8F);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:ui-rounded,'SF Pro Rounded','Segoe UI Variable Display','Segoe UI',system-ui,sans-serif;
  background:var(--bg); color:var(--ink); min-height:100dvh;
  padding-bottom:calc(92px + env(safe-area-inset-bottom));
}
button{font-family:inherit;color:inherit;border:none;background:none;cursor:pointer}
input,textarea{font-family:inherit;font-size:16px}

/* ---------- header ---------- */
header{
  position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px calc(10px);
  background:rgba(255,247,238,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.logo{font-size:22px;font-weight:800;letter-spacing:-.5px;display:flex;align-items:center;gap:8px}
.logo .pan{display:inline-block;font-size:24px}
.gear{font-size:22px;padding:6px;border-radius:12px;transition:transform .3s}
.gear:active{transform:rotate(90deg)}

/* ---------- views ---------- */
main{padding:4px 18px 0;max-width:560px;margin:0 auto}
.view{display:none}
.view.on{display:block;animation:fadeUp .3s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes pop{0%{transform:scale(.6)}60%{transform:scale(1.1)}100%{transform:scale(1)}}
@keyframes bounceY{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
@keyframes fall{to{transform:translateY(110vh) rotate(560deg)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

h1{font-size:26px;font-weight:800;margin:10px 0 4px;letter-spacing:-.5px}
.sub{color:var(--sub);font-size:14px;margin:0 0 16px}

/* ---------- fridge ---------- */
.actionRow{display:flex;gap:10px;margin:6px 0 18px}
.bigBtn{
  flex:1;padding:14px 10px;border-radius:18px;font-size:15px;font-weight:700;
  background:var(--card);box-shadow:var(--shadow);transition:transform .15s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.bigBtn:active{transform:scale(.96)}
.bigBtn.primary{background:var(--grad);color:#fff}
.catHead{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:800;
  color:var(--sub);text-transform:uppercase;letter-spacing:1px;margin:18px 2px 10px}
.chipGrid{display:flex;flex-wrap:wrap;gap:10px}
.itemChip{
  position:relative;display:flex;align-items:center;gap:8px;padding:10px 14px;
  background:var(--card);border-radius:16px;box-shadow:var(--shadow);
  font-size:15px;font-weight:600;animation:fadeUp .18s ease both;transition:transform .15s;
}
.itemChip:active{transform:scale(.94)}
.itemChip .em{font-size:20px}
.qtyBadge{
  font-size:12px;font-weight:800;color:#fff;background:var(--acc2);
  padding:2px 8px;border-radius:99px;
}
.qtyBadge.low{background:var(--pink)}
.staleDot{
  position:absolute;top:-3px;right:-3px;width:12px;height:12px;border-radius:50%;
  background:var(--acc2);border:2px solid var(--bg);
}
.empty{
  text-align:center;padding:48px 20px;color:var(--sub);
}
.empty .big{font-size:56px;display:block;margin-bottom:12px;animation:bounceY 2.4s ease-in-out infinite}

/* ---------- cook ---------- */
.hero{
  background:var(--grad);border-radius:26px;padding:26px 22px;color:#fff;
  box-shadow:0 12px 32px rgba(255,93,143,.25);margin:8px 0 20px;
}
.hero h2{margin:0 0 6px;font-size:24px;font-weight:800;letter-spacing:-.5px}
.hero p{margin:0 0 18px;opacity:.9;font-size:14px}
.heroBtn{
  width:100%;padding:16px;border-radius:18px;background:#fff;color:var(--acc);
  font-size:17px;font-weight:800;transition:transform .15s;
}
.heroBtn:active{transform:scale(.97)}
.banner{
  background:#FFF1E6;border:1.5px dashed var(--acc2);border-radius:18px;
  padding:14px 16px;font-size:14px;margin:8px 0 16px;line-height:1.5;
}
.banner b{color:var(--acc)}

/* quiz */
.quizDots{display:flex;gap:6px;justify-content:center;margin:8px 0 20px}
.quizDots i{width:8px;height:8px;border-radius:50%;background:var(--line);transition:all .3s}
.quizDots i.on{background:var(--acc);width:22px;border-radius:99px}
.quizQ{font-size:24px;font-weight:800;text-align:center;margin:6px 0 22px;letter-spacing:-.5px}
.quizChips{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-bottom:26px}
.qChip{
  padding:12px 18px;border-radius:22px;background:var(--card);box-shadow:var(--shadow);
  font-size:16px;font-weight:700;transition:transform .15s;text-align:center;
}
.qChip small{display:block;font-size:11px;font-weight:600;color:var(--sub);margin-top:3px;letter-spacing:0}
.qChip:active{transform:scale(.92)}
.qChip.sel{background:var(--grad);color:#fff}
.qChip.sel small{color:rgba(255,255,255,.85)}
.quizNav{display:flex;gap:10px;margin-top:8px}
.quizNav .bigBtn{padding:16px}
.quizLabel{font-size:13px;font-weight:800;color:var(--sub);text-transform:uppercase;
  letter-spacing:1px;text-align:center;margin:20px 0 12px}

/* recipe cards */
.rCard{
  display:flex;gap:14px;background:var(--card);border-radius:22px;padding:16px;
  box-shadow:var(--shadow);margin-bottom:14px;animation:fadeUp .4s ease both;
  transition:transform .15s;
}
.rCard:active{transform:scale(.97)}
.rEmoji{
  flex:none;width:74px;height:74px;border-radius:18px;background:#FFF1E6;
  display:flex;align-items:center;justify-content:center;font-size:32px;
  position:relative;overflow:hidden;
}
.rEmoji img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
@keyframes pulseBg{0%,100%{background-color:#FFF1E6}50%{background-color:#FFE3CB}}
.rEmoji,.heroImgWrap,.hThumb{animation:pulseBg 1.6s ease-in-out infinite}
.heroImgWrap{
  position:relative;width:100%;height:210px;border-radius:24px;overflow:hidden;
  background:#FFF1E6;display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow);margin:6px 0 14px;
}
.heroImgWrap .fallbackEm{font-size:72px;animation:bounceY 2.8s ease-in-out infinite}
.heroImgWrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;animation:fadeUp .4s ease both}
.hThumb{
  flex:none;width:46px;height:46px;border-radius:14px;background:#FFF1E6;overflow:hidden;
  display:flex;align-items:center;justify-content:center;font-size:24px;position:relative;
}
.hThumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.rBody{flex:1;min-width:0}
.rName{font-size:17px;font-weight:800;margin:2px 0 3px;letter-spacing:-.3px}
.rDesc{font-size:13px;color:var(--sub);margin:0 0 8px;line-height:1.4}
.rMeta{display:flex;flex-wrap:wrap;gap:6px}
.tag{font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:99px}
.tag.time{background:#FFF1E6;color:var(--acc)}
.tag.use{background:#E9F9EF;color:#2A9D57}
.tag.buy{background:#FFE9F0;color:var(--pink)}

/* recipe detail */
.backBtn{font-size:15px;font-weight:700;color:var(--acc);padding:8px 0;display:inline-flex;align-items:center;gap:6px}
.detailHero{text-align:center;margin:4px 0 18px}
.detailHero .em{font-size:64px;display:block;animation:bounceY 2.8s ease-in-out infinite}
.detailHero h2{font-size:24px;font-weight:800;margin:10px 0 6px;letter-spacing:-.5px}
.ingList{background:var(--card);border-radius:20px;box-shadow:var(--shadow);padding:6px 16px;margin:14px 0}
.ingRow{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1.5px solid var(--line);font-size:15px}
.ingRow:last-child{border-bottom:none}
.ingRow .st{flex:none;font-size:17px}
.ingRow .amt{margin-left:auto;color:var(--sub);font-size:13.5px;font-weight:600;text-align:right}
.ingRow.buy .nm{color:var(--pink);font-weight:700}
.stepRow{display:flex;gap:12px;margin:0 0 16px;font-size:15px;line-height:1.55}
.tipBox{
  background:#FFF6DE;border-left:3px solid var(--acc2);border-radius:0 12px 12px 0;
  padding:8px 12px;font-size:13px;color:#7A6242;margin-top:8px;line-height:1.5;
}
.tipBox.solo{margin:0 0 10px;border-radius:14px;border-left-width:4px;padding:11px 14px}
.stepNum{
  flex:none;width:28px;height:28px;border-radius:50%;background:var(--grad);color:#fff;
  font-weight:800;font-size:14px;display:flex;align-items:center;justify-content:center;margin-top:1px;
}
.madeBtn{
  position:sticky;bottom:calc(96px + env(safe-area-inset-bottom));width:100%;
  padding:17px;border-radius:20px;background:var(--grad);color:#fff;
  font-size:17px;font-weight:800;box-shadow:0 10px 28px rgba(255,93,143,.35);
  transition:transform .15s;margin:20px 0 10px;
}
.madeBtn:active{transform:scale(.97)}
.sectionT{font-size:16px;font-weight:800;margin:20px 2px 10px}

/* ---------- history ---------- */
.hRow{
  display:flex;align-items:center;gap:12px;background:var(--card);border-radius:18px;
  padding:12px 14px;box-shadow:var(--shadow);margin-bottom:10px;animation:fadeUp .3s ease both;
}
.hRow .em{font-size:26px}
.hRow .hName{font-weight:700;font-size:15px}
.hRow .hDate{font-size:12px;color:var(--sub)}
.againBtn{
  margin-left:auto;flex:none;font-size:13px;font-weight:800;color:var(--acc);
  background:#FFF1E6;padding:8px 13px;border-radius:99px;transition:transform .15s;
}
.againBtn:active{transform:scale(.92)}

/* ---------- bottom nav ---------- */
nav{
  position:fixed;left:0;right:0;bottom:0;z-index:30;
  display:flex;justify-content:center;padding:10px 18px calc(12px + env(safe-area-inset-bottom));
  background:rgba(255,247,238,.9);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
}
.navInner{display:flex;gap:6px;background:var(--card);border-radius:24px;padding:6px;box-shadow:var(--shadow);width:100%;max-width:400px}
.navBtn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:9px 4px;border-radius:18px;font-size:11.5px;font-weight:700;color:var(--sub);
  transition:all .2s;
}
.navBtn .ic{font-size:20px;transition:transform .2s}
.navBtn.on{background:var(--grad);color:#fff}
.navBtn.on .ic{transform:scale(1.12)}

/* ---------- sheet ---------- */
#sheetBack{
  position:fixed;inset:0;z-index:40;background:rgba(51,38,29,.35);
  opacity:0;pointer-events:none;transition:opacity .25s;
}
#sheetBack.on{opacity:1;pointer-events:auto}
#sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:41;background:var(--card);
  border-radius:26px 26px 0 0;padding:10px 20px calc(20px + env(safe-area-inset-bottom));
  max-height:82dvh;overflow-y:auto;transform:translateY(105%);transition:transform .32s cubic-bezier(.3,1.1,.4,1);
  max-width:560px;margin:0 auto;
}
#sheet.on{transform:none}
.grabber{width:40px;height:5px;border-radius:99px;background:var(--line);margin:4px auto 14px}
.sheetT{font-size:19px;font-weight:800;margin:0 0 14px;letter-spacing:-.3px}
.field{width:100%;padding:13px 15px;border:2px solid var(--line);border-radius:15px;
  background:var(--bg);outline:none;margin-bottom:10px}
.field:focus{border-color:var(--acc2)}
textarea.field{resize:vertical;min-height:80px}
.suggest{display:flex;flex-wrap:wrap;gap:8px;margin:4px 0 14px}
.sgChip{padding:8px 13px;border-radius:99px;background:var(--bg);font-size:14px;font-weight:600;
  border:1.5px solid var(--line);transition:transform .12s}
.sgChip:active{transform:scale(.92)}
.qtyRow{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:12px}
.qtyOpt{flex:none;padding:9px 15px;border-radius:99px;background:var(--bg);border:1.5px solid var(--line);
  font-size:14px;font-weight:700}
.qtyOpt.sel{background:var(--grad);color:#fff;border-color:transparent}
.sheetBtn{width:100%;padding:15px;border-radius:16px;background:var(--grad);color:#fff;
  font-size:16px;font-weight:800;margin-top:4px;transition:transform .15s}
.sheetBtn:active{transform:scale(.97)}
.sheetBtn.ghost{background:var(--bg);color:var(--ink);border:1.5px solid var(--line)}
.sheetBtn.danger{background:#FFE9F0;color:var(--pink)}
.stepper{display:flex;align-items:center;justify-content:center;gap:22px;margin:10px 0 16px}
.stepBtn{width:52px;height:52px;border-radius:18px;background:var(--bg);border:1.5px solid var(--line);
  font-size:24px;font-weight:800;transition:transform .12s}
.stepBtn:active{transform:scale(.9)}
.stepVal{font-size:30px;font-weight:800;min-width:70px;text-align:center}
.segRow{display:flex;gap:8px;margin:6px 0 16px}
.seg{flex:1;padding:12px;border-radius:15px;background:var(--bg);border:1.5px solid var(--line);
  font-size:14px;font-weight:700;text-align:center}
.seg.sel{background:var(--grad);color:#fff;border-color:transparent}
.linkBtn{display:block;text-align:center;color:var(--acc);font-weight:700;font-size:14px;padding:10px;width:100%}
.hint{font-size:12.5px;color:var(--sub);line-height:1.5;margin:8px 0}
.hint a{color:var(--acc)}

/* usage checklist */
.useRow{
  display:flex;align-items:center;gap:10px;padding:13px 14px;border-radius:16px;
  background:var(--bg);border:1.5px solid var(--line);margin-bottom:9px;
  font-size:15px;font-weight:600;transition:transform .12s;
}
.useRow:active{transform:scale(.97)}
.useRow .arrow{color:var(--sub);font-size:13px}
.useRow .after{margin-left:auto;font-weight:800;color:var(--acc);font-size:14px;
  background:#FFF1E6;padding:4px 11px;border-radius:99px}
.useRow .after.gone{color:var(--pink);background:#FFE9F0}
.useRow .after.same{color:var(--sub);background:var(--line)}

/* scan review */
.scanRow{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:16px;
  background:var(--bg);border:1.5px solid var(--line);margin-bottom:9px;font-size:15px;font-weight:600}
.scanRow.off{opacity:.38}
.scanRow .em{font-size:20px}
.scanRow .q{margin-left:auto;font-size:13px;font-weight:800;color:var(--acc)}

/* ---------- loading ---------- */
#loader{
  position:fixed;inset:0;z-index:60;display:none;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(255,247,238,.94);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
#loader.on{display:flex}
#loader .pan{font-size:64px;animation:bounceY 1s ease-in-out infinite}
#loader .msg{margin-top:18px;font-size:16px;font-weight:700;color:var(--sub)}

/* ---------- toast ---------- */
#toasts{position:fixed;top:14px;left:0;right:0;z-index:70;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}
.toast{
  background:var(--ink);color:#fff;font-size:14px;font-weight:700;padding:11px 18px;
  border-radius:99px;box-shadow:0 8px 24px rgba(51,38,29,.25);animation:fadeUp .3s ease both;
  max-width:86vw;
}

/* confetti */
.confetto{position:fixed;top:-40px;z-index:80;font-size:24px;pointer-events:none;animation:fall 1.5s ease-in forwards}
</style>
</head>
<body>

<header>
  <div class="logo"><span class="pan">🍳</span>Cooksy</div>
  <button class="gear" onclick="settingsSheet()">⚙️</button>
</header>

<main>
  <section id="view-fridge" class="view"></section>
  <section id="view-cook" class="view"></section>
  <section id="view-history" class="view"></section>
</main>

<nav>
  <div class="navInner">
    <button class="navBtn" id="nav-fridge" onclick="nav('fridge')"><span class="ic">🧊</span>Fridge</button>
    <button class="navBtn" id="nav-cook" onclick="nav('cook')"><span class="ic">🍳</span>Cook</button>
    <button class="navBtn" id="nav-history" onclick="nav('history')"><span class="ic">📖</span>History</button>
  </div>
</nav>

<div id="sheetBack" onclick="backdropTap()"></div>
<div id="sheet"></div>
<div id="loader"><div class="pan">🍳</div><div class="msg" id="loaderMsg">Cooking up ideas…</div></div>
<div id="toasts"></div>
<input type="file" id="scanInput" accept="image/*" capture="environment" style="display:none">
<input type="file" id="importInput" accept=".json" style="display:none">

<script>

  tuna:['🐟','meat'],shrimp:['🍤','meat'],fish:['🐟','meat'],turkey:['🦃','meat'],lamb:['🥩','meat'],
  cod:['🐟','meat'],tilapia:['🐟','meat'],'ground turkey':['🦃','meat'],
  rice:['🍚','pantry'],pasta:['🍝','pantry'],spaghetti:['🍝','pantry'],bread:['🍞','pantry'],

function lookupItem(rawName){
  const n = rawName.toLowerCase().trim();
  if(known[n]) return { name:n, emoji:known[n].emoji, category:known[n].category };
  if(SEED[n]) return { name:n, emoji:SEED[n][0], category:SEED[n][1] };
  // ponytail: naive singularize — strip trailing 's'; covers apples→apple, misses berries→berry
  const sing = n.replace(/s$/,'');
  if(SEED[sing]) return { name:sing, emoji:SEED[sing][0], category:SEED[sing][1] };
  if(known[sing]) return { name:sing, emoji:known[sing].emoji, category:known[sing].category };
  return { name:n, emoji:'🥘', category:'other' };
}

function qtyLabel(q){
  if(!q) return '';
  if(q.type === 'count') return '×' + q.n;
  if(q.type === 'text') return q.label;
  return { full:'Full', half:'Half', low:'Low' }[q.v] || q.v;
}
function isLow(q){
  return q && ((q.type === 'count' && q.n <= 1) || (q.type === 'level' && q.v === 'low'));

const POURABLE_RE = /(juice|milk|oil|sauce|cream|broth|stock|syrup|honey|vinegar|dressing|yogurt|butter|jam|jelly|ketchup|mayo|mustard|salsa|hummus|wine|beer|soda|water|paste|spread|dip|puree)/;

function addToFridge(name, qty, emoji, category){
  const info = lookupItem(name);
  emoji = emoji || info.emoji; category = category || info.category;
  const nm = info.name;
  known[nm] = { emoji, category }; saveKnown();
  const ex = fridge.find(f => f.name === nm);
  if(ex){
    if(ex.qty.type === 'count' && qty.type === 'count') ex.qty.n += qty.n;
    else ex.qty = qty;
    ex.addedAt = Date.now();
  } else {
    fridge.push({ id: uid(), name: nm, emoji, category, qty, addedAt: Date.now() });
  }
  saveFridge();
}

/* ================= claude api ================= */
const MODEL_SMART = 'claude-sonnet-5';        // recipe ideas + full recipes
const MODEL_FAST  = 'claude-haiku-4-5-20251001'; // photo scan + usage math — much faster
async function apiFetch(body){
  if(!settings.apiKey) throw new Error('NO_KEY');
  const opts = {
    method:'POST',
    headers:{
      'content-type':'application/json',
      'x-api-key': settings.apiKey,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body: JSON.stringify(body)
  };
  // a hung request must not brick the app behind the loader
  if(typeof AbortSignal !== 'undefined' && AbortSignal.timeout) opts.signal = AbortSignal.timeout(60000);
  const r = await fetch('https://api.anthropic.com/v1/messages', opts);
  if(!r.ok){
    let msg = 'API error ' + r.status;
    try{ const e = await r.json(); msg += ': ' + (e.error && e.error.message || '').slice(0,140) }catch(_){}
    throw new Error(msg);
  }
  return r.json();
}

function parseJSONLoose(t){
  t = String(t).trim().replace(/^```(?:json)?/i,'').replace(/```$/,'').trim();
  const s = t.indexOf('{'), e = t.lastIndexOf('}');
  if(s < 0 || e <= s) throw new Error('no JSON found');
  return JSON.parse(t.slice(s, e+1));
}

// forced tool call — the API returns parsed JSON as the tool input, no text parsing
async function askJSON(content, system, maxTokens, model){
  const attempt = async extra => {
    const d = await apiFetch({
      model: model || MODEL_SMART,
      max_tokens: (maxTokens || 3000) + extra,
      system: system || 'You are a helpful cooking assistant.',
      messages: [{ role:'user', content }],
      tools: [{ name:'emit_json', description:'Emit the result in exactly the JSON shape the user asked for.',
        input_schema:{ type:'object', additionalProperties:true } }],
      tool_choice: { type:'tool', name:'emit_json' }
    });
    const tu = (d.content || []).find(b => b.type === 'tool_use');
    if(tu && tu.input && typeof tu.input === 'object' && Object.keys(tu.input).length) return tu.input;
    // fallback: model answered with plain text anyway
    return parseJSONLoose((d.content || []).map(b => b.text || '').join(''));
  };
  try{
    return await attempt(0);
  }catch(err){
    if(err.message === 'NO_KEY' || /^API error (400|401|403)/.test(err.message)) throw err;
    return attempt(1500); // retry with more room for truncation
  }
}

/* ---- recipe images ---- */
// free AI images, no key: deterministic seed = same photo for same dish forever.
// ONE url per recipe (cards + hero share it) so it generates once and is cached on tap.
function foodImgUrl(r){
  const seed = [...String(r.name)].reduce((a, c) => a + c.charCodeAt(0), 7);
  const prompt = encodeURIComponent(
    `delicious ${r.name}, ${r.description || 'home cooked'}, professional food magazine photography, appetizing, beautifully plated, natural light, high detail`);
  return `https://image.pollinations.ai/prompt/${prompt}?width=640&height=640&nologo=true&enhance=true&seed=${seed}`;
}
const NANO = new Map(); // session cache of Nano Banana heroes — never persisted (localStorage quota)
const recipeImg = r => NANO.get(r.name) || r.img || foodImgUrl(r);
// pollinations allows ONE generation at a time per IP — parallel loads got 429'd
// and looked "half generated". Strict client-side queue: one img loads at a time,
// failures retry twice with backoff, the visible recipe page jumps the queue.
const IMGQ = [];
const IMG_DONE = new Set(); // urls that loaded once — re-renders show them instantly, no re-queue
let imgBusy = false;
function scanImgs(priority){
  document.querySelectorAll('img[data-src]:not([data-q])').forEach(el => {
    el.setAttribute('data-q', '1');
    if(IMG_DONE.has(el.dataset.src)){ el.src = el.dataset.src; return; } // browser cache hit
    priority ? IMGQ.unshift(el) : IMGQ.push(el);
  });
  pumpImgQ();
}
function pumpImgQ(){
  if(imgBusy) return;
  let el;
  // skip detached nodes AND ones that already got a src (e.g. Nano Banana beat the queue)
  while((el = IMGQ.shift())){ if(document.contains(el) && !el.src) break; }
  if(!el) return;
  imgBusy = true;
  const next = () => { el.onload = null; el.onerror = null; imgBusy = false; setTimeout(pumpImgQ, 400); };
  el.onload = () => { IMG_DONE.add(el.dataset.src); next(); };
  el.onerror = () => {
    const n = +(el.dataset.r || 0);
    el.removeAttribute('src');
    if(n < 2){
      el.dataset.r = n + 1;
      setTimeout(() => { IMGQ.push(el); pumpImgQ(); }, 2000 * (n + 1));
    } else el.remove();
    next();
  };
  el.src = el.dataset.src + (el.dataset.r ? '&retry=' + el.dataset.r : '');
}

// optional: Nano Banana Pro hero image via user's Google AI key
async function nanoBanana(r){
  const res = await fetch(
    'https://generativelanguage.googleapis.com/v1beta/models/gemini-3-pro-image:generateContent?key=' + settings.googleKey,
    { method:'POST', headers:{ 'content-type':'application/json' },
      body: JSON.stringify({
        contents:[{ parts:[{ text:
          `Professional food photography, appetizing hero shot of "${r.name}" — ${r.description || ''}. Plated beautifully, natural window light, shallow depth of field, no text.` }] }],
        generationConfig:{ responseModalities:['TEXT','IMAGE'], imageConfig:{ aspectRatio:'1:1' } }
      }) });
  if(!res.ok) throw new Error('image API ' + res.status);
  const d = await res.json();
  let b64 = null;
  const parts = d.candidates && d.candidates[0] && d.candidates[0].content && d.candidates[0].content.parts || [];
  for(const p of parts){ if(p.inlineData && p.inlineData.data){ b64 = 'data:' + (p.inlineData.mimeType || 'image/png') + ';base64,' + p.inlineData.data; break; } }
  if(!b64) throw new Error('no image in response');
  // downscale to keep localStorage sane
  return shrinkDataUrl(b64, 640);
}
function shrinkDataUrl(dataUrl, maxPx){
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxPx / Math.max(img.width, img.height));
      const cv = document.createElement('canvas');
      cv.width = Math.round(img.width * scale); cv.height = Math.round(img.height * scale);
      cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
      resolve(cv.toDataURL('image/jpeg', 0.78));
    };
    img.onerror = () => reject(new Error('bad image data'));
    img.src = dataUrl;
  });
}

function apiErrorToast(err){
  if(err.message === 'NO_KEY'){ toast('Add your API key in ⚙️ first'); settingsSheet(); }
  else if(/401/.test(err.message)) toast('API key rejected — check it in ⚙️');
  else if(/Failed to fetch/i.test(err.message)) toast('No connection 📡');
  else if(/timed out|abort/i.test(err.message) || err.name === 'TimeoutError') toast('Took too long — try again ⏳');
  else toast(err.message.slice(0,90));
}

const COUNT_OPTS = [{type:'count',n:1},{type:'count',n:2},{type:'count',n:3},{type:'count',n:4},{type:'count',n:6}];
const LEVEL_OPTS = [{type:'level',v:'full'},{type:'level',v:'half'},{type:'level',v:'low'}];
let addOpts = [];
function renderQtyRow(){
  const box = $('#qtyRow'); if(!box) return;
  const nm = ($('#addName') ? $('#addName').value : '').trim();
  const pour = isPourable(nm);
  addOpts = pour ? [...LEVEL_OPTS, ...COUNT_OPTS] : [...COUNT_OPTS, ...LEVEL_OPTS];
  // sensible default follows the item type until user picks one
  if(!addQtyTouched && addQty.type !== 'text'){
    addQty = pour ? {type:'level',v:'full'} : {type:'count',n:1};
  }
  const customOn = addQty.type === 'text';
  box.innerHTML = addOpts.map((q,i) =>
    `<button class="qtyOpt ${!customOn && JSON.stringify(q)===JSON.stringify(addQty)?'sel':''}" onclick="setAddQty(${i})">${qtyLabel(q)}</button>`
  ).join('') + `<button class="qtyOpt ${customOn?'sel':''}" onclick="toggleCustomQty()">✏️ Custom</button>`;
}
function setAddQty(i){
  addQty = addOpts[i]; addQtyTouched = true;
  const c = $('#customQty'); if(c) c.style.display = 'none';
  renderQtyRow();
}
function toggleCustomQty(){
  const c = $('#customQty'); if(!c) return;
  c.style.display = 'block';
  addQty = { type:'text', label: c.value.trim() }; addQtyTouched = true;

function renderSuggest(){
  const box = $('#suggestBox'); if(!box) return;
  const q = ($('#addName') ? $('#addName').value : '').toLowerCase().trim();
  const all = [...new Set([...Object.keys(known), ...Object.keys(SEED)])];
  let names;
  if(!q){
    const inF = new Set(fridge.map(f => f.name));
    names = Object.keys(known).filter(n => !inF.has(n)).slice(0,10);
    if(names.length < 6) names = names.concat(['egg','milk','chicken','tomato','cheese','rice'].filter(n => !inF.has(n) && !names.includes(n)));
  } else {
    names = all.filter(n => n.startsWith(q)).concat(all.filter(n => !n.startsWith(q) && n.includes(q))).slice(0,10);
  }
  box.innerHTML = names.map(n => {
    const info = lookupItem(n);
    return `<button class="sgChip" onclick="pickSuggest('${esc(n)}')">${info.emoji} ${esc(cap(n))}</button>`;
  }).join('');
}
function pickSuggest(n){ $('#addName').value = n; renderSuggest(); }
function commitAdd(){
  const nm = ($('#addName').value || '').trim();

}

function bumpQty(d){
  const it = fridge.find(f => f.id === editId); if(!it) return;
  it.qty.n = Math.max(1, it.qty.n + d);
  saveFridge();
  const el = document.querySelector('#sheet .stepVal');
  if(el) el.textContent = '×' + it.qty.n; // in place — full re-render flickers
}
function setLevel(v){
  const it = fridge.find(f => f.id === editId); if(!it) return;
  it.qty = { type:'level', v };
  saveFridge(); renderEditSheet();
}
function setCustomLabel(v){
  const it = fridge.find(f => f.id === editId); if(!it) return;
  it.qty = { type:'text', label: v.trim() };
  saveFridge(); // no re-render — user is typing
}
function switchQtyMode(m){
  const it = fridge.find(f => f.id === editId); if(!it || it.qty.type === m) return;
  it.qty = m === 'count' ? { type:'count', n:1 } : m === 'level' ? { type:'level', v:'full' } : { type:'text', label: qtyLabel(it.qty) };
  saveFridge(); renderEditSheet();
  if(m === 'text') setTimeout(() => { const f = $('#editCustom'); if(f){ f.focus(); f.select(); } }, 100);
}

      { type:'text', text:
`List every distinct food item you can clearly identify in this fridge/pantry photo.
Return ONLY JSON:
{"items":[{"name":"lowercase singular name","emoji":"one emoji","category":"produce|dairy|meat|pantry|other","qty":{"type":"count","n":2} or {"type":"level","v":"full|half|low"}}]}

    ], undefined, 1500, MODEL_FAST);

    if(!items.length){ toast('Couldn’t spot anything — try typing instead'); return; }
    scanReviewSheet(items);
  }catch(err){
    loading(false); apiErrorToast(err);
  }
});
function imageToBase64(file, maxPx){
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxPx / Math.max(img.width, img.height));
      const cv = document.createElement('canvas');
      cv.width = Math.round(img.width * scale);
      cv.height = Math.round(img.height * scale);
      cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
      URL.revokeObjectURL(url);
      resolve(cv.toDataURL('image/jpeg', 0.8).split(',')[1]);
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Could not read image')); };
    img.src = url;
  });
}

function confirmScan(){
  let n = 0;
  for(const it of scanItems){
    if(!it.include) continue;
    const qty = (it.qty && (it.qty.type === 'count' || it.qty.type === 'level')) ? it.qty : { type:'count', n:1 };
    const cat = ['produce','dairy','meat','pantry','other'].includes(it.category) ? it.category : null;
    addToFridge(it.name, qty, it.emoji, cat);
    n++;
  }
  closeSheet(); renderFridge();
  toast(n + ' item' + (n!==1?'s':'') + ' added 🎉');

function startQuiz(){
  if(!settings.apiKey){ toast('Add your API key in ⚙️ first'); settingsSheet(); return; }
  if(fridge.length < 2){ toast('Add a few fridge items first 🧊'); nav('fridge'); return; }
  quiz = { step:0, meal:null, serve:null, taste:new Set(), texture:new Set(), cuisine:new Set(), health:new Set(), effort:null, vibe:null };
  renderQuiz();
}
function renderQuiz(){
  const st = QUIZ_STEPS[quiz.step];
  const v = $('#view-cook');
  let chips = st.opts.map(([em, val, ex]) => {
    const sel = st.multi ? quiz[st.key].has(val) : quiz[st.key] === val;
    return `<button class="qChip ${sel?'sel':''}" onclick="quizPick('${st.key}','${val}',${st.multi})">${em} ${esc(val)}<small>${esc(ex || '')}</small></button>`;
  }).join('');
  let extra = '';
  if(st.extra){
    extra = `<div class="quizLabel">${st.extra.label}</div><div class="quizChips">` +
      st.extra.opts.map(([em, val, ex]) =>
        `<button class="qChip ${quiz[st.extra.key]===val?'sel':''}" onclick="quizPick('${st.extra.key}','${val}',false)">${em} ${esc(val)}<small>${esc(ex || '')}</small></button>`
      ).join('') + `</div>`;
  }
  const last = quiz.step === QUIZ_STEPS.length - 1;
  v.innerHTML = `
    <div class="quizDots">${QUIZ_STEPS.map((_,i)=>`<i class="${i<=quiz.step?'on':''}"></i>`).join('')}</div>
    <div class="quizQ">${st.q}</div>
    <div class="quizChips">${chips}</div>
    ${extra}
    <div class="quizNav">
      <button class="bigBtn" onclick="quizBack()">← Back</button>
      <button class="bigBtn primary" onclick="quizNext()">${last ? 'Find recipes 🍳' : 'Next →'}</button>
    </div>
    <p class="hint" style="text-align:center">Nothing selected = surprise me 🎲</p>`;
}
function quizPick(key, val, multi){
  if(multi){
    quiz[key].has(val) ? quiz[key].delete(val) : quiz[key].add(val);
  } else {
    quiz[key] = quiz[key] === val ? null : val;
  }
  renderQuiz();
}
function quizBack(){
  if(quiz.step === 0){ renderCookHome(); return; }
  quiz.step--; renderQuiz();
}
function quizNext(){
  if(quiz.step < QUIZ_STEPS.length - 1){ quiz.step++; renderQuiz(); return; }
  findRecipes();
}

`My fridge inventory with rough quantities:
${fridgeStr}

/* ---- difficulty levels ---- */
const LEVELS = {
  easy:    { label:'🥄 Simple',  desc:'simplest weeknight version — fewest ingredients, basic technique, minimal time' },
  classic: { label:'🍳 Classic', desc:'standard well-rounded home version' },
  chef:    { label:'👨‍🍳 Gourmet', desc:'elevated gourmet version — richer ingredients, finer technique, beautiful presentation (up to 3 buy-items allowed)' }
};
let currentLevel = 'classic';
const normStep = s => typeof s === 'string' ? { text: s } : (s || { text: '' });
// recipes saved before levels existed have flat ingredients/steps
function migrateLevels(r){
  if(!r.levels) r.levels = {};
  if(Array.isArray(r.ingredients) && Array.isArray(r.steps) && !r.levels.classic){
    r.levels.classic = { minutes: r.minutes, ingredients: r.ingredients, steps: r.steps, tips: r.tips || [] };
  }
  return r;
}

async function fetchLevel(r, level){
  const res = await askJSON(
`Write the ${LEVELS[level].desc} of: "${r.name}" — ${r.description || ''}

My fridge: ${fridge.map(f => f.name + ' (' + qtyLabel(f.qty) + ')').join(', ')}
Staples I have: ${settings.staples.join(', ')}
${lastRecipes && lastRecipes.cravings ? 'Suggested for cravings: ' + lastRecipes.cravings : ''}
${lastRecipes && lastRecipes.health ? `HEALTH REQUIREMENTS (hard constraints for EVERY version, including gourmet): ${lastRecipes.health}. "sugar-free" = ZERO added sugar/honey/syrup (fruit ok). "oil-free" = no oil or butter.` : ''}

Scale to what I have, for ${(lastRecipes && lastRecipes.serve) || '1-2 servings'}. Max 10 concise steps.
Most steps should carry a genuinely useful tip: technique, timing, texture, or a common mistake to avoid (e.g. "rinse cut potatoes in cold water to wash off starch, then pat dry — that's what makes them crispy").

Return ONLY JSON:
{"minutes":25,"ingredients":[{"item":"...","amount":"e.g. 2, 1 cup, a splash","status":"have|staple|buy"}],"steps":[{"text":"the instruction","tip":"short pro tip for this step (omit only if truly nothing useful)"}],"tips":["1-3 overall chef tips that elevate this exact dish"]}`,
    'You are a practical home-cooking chef who teaches while cooking. Respond with ONLY valid JSON. No markdown, no commentary.', 2200);
  if(!Array.isArray(res.ingredients) || !Array.isArray(res.steps)) throw new Error('Got a weird answer — try again');
  r.levels[level] = { minutes: res.minutes || r.minutes, ingredients: res.ingredients, steps: res.steps, tips: res.tips || [] };
}
function persistRecipeCaches(){
  if(lastRecipes) store.set('lastRecipes', lastRecipes);
  saveSaved(); saveCooked();
}

async function openRecipe(i, from){
  detailReturn = from || 'results';

    loading(true, 'detail');
    try{ await fetchLevel(r, currentLevel); persistRecipeCaches(); }
    catch(err){ loading(false); apiErrorToast(err); return; }
    loading(false);

async function switchLevel(l){

  if(!r || currentLevel === l) return;
  const prev = currentLevel;

    loading(true, 'detail');
    try{ await fetchLevel(r, l); persistRecipeCaches(); }
    catch(err){ loading(false); apiErrorToast(err); currentLevel = prev; return; }
    loading(false);
  }
  renderRecipeDetail(r);
}

/* ---- save recipe (favorites) ---- */
function isSaved(r){ return saved.some(s => s.recipe.name === r.name); }
function toggleSave(){
  const r = currentRecipe; if(!r) return;
  if(isSaved(r)){
    saved = saved.filter(s => s.recipe.name !== r.name);
    toast('Removed from saved');
  } else {
    const rec = { ...r };
    if(rec.img && rec.img.startsWith('data:')) delete rec.img;
    saved.unshift({ id: uid(), recipe: rec, savedAt: Date.now() });
    toast('Saved ♥ — find it in History');
  }
  saveSaved();
  const b = $('#saveBtn'); if(b) b.textContent = isSaved(r) ? '♥ Saved' : '♡ Save';
}
function openSaved(id){
  const s = saved.find(x => x.id === id);
  if(!s) return;
  detailReturn = 'history';
  renderRecipeDetail(s.recipe);
}

      'You estimate ingredient usage. Respond with ONLY valid JSON.', 1000, MODEL_FAST);
    loading(false);
    const updates = (res.updates || []).map(u => {
      const item = fridge.find(f => f.name === String(u.name || '').toLowerCase().trim())
              || fridge.find(f => String(u.name || '').toLowerCase().includes(f.name));
      return item ? { item, after: u.after } : null;
    }).filter(Boolean);
    usageSheet(updates, r);
  }catch(err){
    loading(false); apiErrorToast(err);
    usageSheet([], r); // estimate failed (offline?) — cook must still be loggable
  }
}
function usageSheet(updates, r){
  usageRows = updates.map(u => {
    const opts = [];
    const seen = new Set();
    const push = (after, label) => {
      const k = JSON.stringify(after);
      if(seen.has(k)) return; seen.add(k);
      opts.push({ after, label });
    };
    push(u.after, u.after === null ? 'Gone' : qtyLabel(u.after));
    push(null, 'Gone');
    if(u.item.qty.type === 'count' && u.item.qty.n > 1) push({ type:'count', n: u.item.qty.n - 1 }, '×' + (u.item.qty.n - 1));
    if(u.item.qty.type === 'level'){ push({ type:'level', v:'half' }, 'Half'); push({ type:'level', v:'low' }, 'Low'); }
    push(u.item.qty, 'Unchanged');
    return { item: u.item, opts, sel: 0 };
  });
  openSheet(`
    <div class="sheetT">🍽️ How did we do?</div>
    <p class="hint">My guess of what got used — tap any line to correct it.</p>
    <div id="usageList"></div>
    <button class="sheetBtn" onclick="confirmUsage()">Update fridge ✨</button>
    <button class="sheetBtn ghost" onclick="skipUsage()" style="margin-top:8px">Skip — fridge unchanged</button>
  `, skipUsage); // stray backdrop tap still logs the cook instead of silently losing it
  renderUsageList();
}
function renderUsageList(){
  const box = $('#usageList'); if(!box) return;
  if(!usageRows.length){
    box.innerHTML = '<p class="hint">Nothing from your fridge seems used — odd, but tap update to just log the cook.</p>';
    return;
  }
  box.innerHTML = usageRows.map((row, i) => {
    const o = row.opts[row.sel];
    const cls = o.after === null ? 'gone' : (o.label === 'Unchanged' ? 'same' : '');
    return `
    <button class="useRow" style="width:100%;text-align:left" onclick="cycleUsage(${i})">
      <span>${row.item.emoji}</span>${esc(cap(row.item.name))}
      <span class="arrow">${qtyLabel(row.item.qty)} →</span>
      <span class="after ${cls}">${esc(o.label)}</span>
    </button>`;
  }).join('');
}
function cycleUsage(i){
  usageRows[i].sel = (usageRows[i].sel + 1) % usageRows[i].opts.length;
  renderUsageList();
}
function applyCookLog(){
  // ponytail: drop generated data-URL images from history (localStorage quota);
  // history thumbs regenerate free + deterministic from the recipe name
  const rec = { ...currentRecipe };
  if(rec.img && rec.img.startsWith('data:')) delete rec.img;
  cooked.unshift({ id: uid(), recipe: rec, cookedAt: Date.now() });
  cooked = cooked.slice(0, 100);
  saveCooked();
}
function confirmUsage(){
  for(const row of usageRows){
    const after = row.opts[row.sel].after;
    if(row.opts[row.sel].label === 'Unchanged') continue;
    if(after === null){
      fridge = fridge.filter(f => f.id !== row.item.id);
    } else {
      const f = fridge.find(x => x.id === row.item.id);
      if(f) f.qty = after;
    }
  }
  saveFridge();
  applyCookLog();
  closeSheet(); confetti();
  toast('Fridge updated — nice cooking! 🎉');
  renderCookHome(); nav('fridge');
}
function skipUsage(){
  applyCookLog();
  closeSheet(); confetti();
  toast('Logged it — fridge untouched 👍');
  renderCookHome();
}

/* ================= history view ================= */
function renderHistory(){
  const v = $('#view-history');
  let html = `<h1>Your recipes</h1><p class="sub">${(saved.length || cooked.length) ? 'Saved favorites and everything you’ve cooked.' : ''}</p>`;
  if(saved.length){
    html += `<div class="sectionT">♥ Saved</div>` + saved.map((s, i) => `
      <div class="hRow" style="animation-delay:${Math.min(i,8)*60}ms" onclick="openSaved('${s.id}')">
        <span class="hThumb">${esc(s.recipe.emoji || '🍽️')}<img data-src="${esc(recipeImg(s.recipe))}" alt=""></span>
        <div>
          <div class="hName">${esc(s.recipe.name)}</div>
          <div class="hDate">⏱ ${esc(String(s.recipe.minutes || '?'))} min</div>
        </div>
        <button class="againBtn">Open 🍳</button>
      </div>`).join('');
  }
  if(!saved.length && !cooked.length){
    html += `<div class="empty"><span class="big">📖</span>Nothing here yet.<br>Save recipes with ♡ or cook something!</div>`;
  }
  if(cooked.length){
    html += `<div class="sectionT">Cooked before</div>` + cooked.map((c, i) => `
      <div class="hRow" style="animation-delay:${Math.min(i,8)*60}ms" onclick="makeAgain('${c.id}')">
        <span class="hThumb">${esc(c.recipe.emoji || '🍽️')}<img data-src="${esc(recipeImg(c.recipe))}" alt=""></span>
        <div>
          <div class="hName">${esc(c.recipe.name)}</div>
          <div class="hDate">${new Date(c.cookedAt).toLocaleDateString(undefined,{month:'short',day:'numeric'})} · ⏱ ${esc(String(c.recipe.minutes || '?'))} min</div>
        </div>
        <button class="againBtn">Again 🍳</button>
      </div>`).join('');
  }
  v.innerHTML = html;
  scanImgs();
}
function makeAgain(id){
  const c = cooked.find(x => x.id === id);
  if(!c) return;
  detailReturn = 'history';
  renderRecipeDetail(c.recipe);
}

/* ================= settings ================= */
function settingsSheet(){
  openSheet(`
    <div class="sheetT">⚙️ Settings</div>
    <div class="quizLabel" style="text-align:left;margin:2px 0 8px">Claude API key</div>
    <input class="field" id="setKey" type="password" placeholder="sk-ant-…" value="${esc(settings.apiKey)}">
    <p class="hint">Get one at <a href="https://console.anthropic.com" target="_blank" rel="noopener">console.anthropic.com</a>. Stored only on this device. Each recipe search costs roughly a cent.</p>
    <div class="quizLabel" style="text-align:left;margin:14px 0 8px">Google AI key — optional, for Nano Banana Pro photos</div>
    <input class="field" id="setGKey" type="password" placeholder="AIza… (leave empty = free AI photos)" value="${esc(settings.googleKey || '')}">
    <p class="hint">Without it recipes still get free AI photos. With it (<a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">aistudio.google.com</a>), the big recipe photo is generated by Nano Banana Pro (~13¢/image).</p>
    <div class="quizLabel" style="text-align:left;margin:14px 0 8px">Pantry staples (always assumed)</div>
    <textarea class="field" id="setStaples">${esc(settings.staples.join(', '))}</textarea>
    <button class="sheetBtn" onclick="saveSettingsSheet()">Save ✅</button>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="sheetBtn ghost" style="margin:0" onclick="exportData()">⬇️ Export</button>
      <button class="sheetBtn ghost" style="margin:0" onclick="$('#importInput').click()">⬆️ Import</button>
    </div>
    <button class="sheetBtn danger" onclick="clearAll()" style="margin-top:8px">🗑 Erase everything</button>
    <p class="hint" style="text-align:center;margin-top:12px">Cooksy v${APP_VERSION}</p>
  `);
}
function saveSettingsSheet(){
  settings.apiKey = $('#setKey').value.trim();
  settings.googleKey = $('#setGKey').value.trim();
  settings.staples = $('#setStaples').value.split(',').map(s => s.trim().toLowerCase()).filter(Boolean);
  if(!settings.staples.length) settings.staples = DEFAULT_STAPLES.slice();
  saveSettings();
  closeSheet(); toast('Settings saved ✅');
  if(currentView === 'cook') renderCookHome();
}
function exportData(){
  const data = { fridge, cooked, saved, known, staples: settings.staples, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'cooksy-backup.json';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Backup downloaded (key not included)');
}
$('#importInput').addEventListener('change', e => {
  const file = e.target.files[0];
  e.target.value = '';
  if(!file) return;
  const rd = new FileReader();
  rd.onload = () => {
    try{
      const d = JSON.parse(rd.result);
      if(Array.isArray(d.fridge)) fridge = d.fridge;
      if(Array.isArray(d.cooked)) cooked = d.cooked;
      if(Array.isArray(d.saved)) saved = d.saved;
      if(d.known && typeof d.known === 'object') known = d.known;
      if(Array.isArray(d.staples)) settings.staples = d.staples;
      saveFridge(); saveCooked(); saveSaved(); saveKnown(); saveSettings();
      closeSheet(); nav('fridge');
      toast('Backup restored 🎉');
    }catch(err){ toast('That file doesn’t look like a Cooksy backup'); }
  };
  rd.readAsText(file);
});
function clearAll(){
  if(!confirm('Erase fridge, history and settings on this device?')) return;
  localStorage.removeItem('cooksy.fridge');
  localStorage.removeItem('cooksy.cooked');
  localStorage.removeItem('cooksy.saved');
  localStorage.removeItem('cooksy.known');
  localStorage.removeItem('cooksy.settings');
  localStorage.removeItem('cooksy.lastRecipes');
  location.reload();
}

/* ================= sheet plumbing ================= */
let sheetDismiss = null; // custom backdrop-tap behavior (protects destructive sheets)
let vvPin = null;
function openSheet(html, onDismiss){
  sheetDismiss = onDismiss || null;
  $('#sheet').innerHTML = '<div class="grabber"></div>' + html;
  $('#sheet').classList.add('on');
  $('#sheetBack').classList.add('on');
  document.body.style.overflow = 'hidden'; // stop background scrolling behind sheet
  // iOS keyboard overlays position:fixed — pin the sheet to the visual viewport
  if(window.visualViewport && !vvPin){
    vvPin = () => {
      const s = $('#sheet'), vv = window.visualViewport;
      if(!s.classList.contains('on')){ s.style.bottom = ''; s.style.maxHeight = ''; return; }
      s.style.bottom = Math.max(0, window.innerHeight - vv.height - vv.offsetTop) + 'px';
      s.style.maxHeight = Math.round(vv.height * 0.9) + 'px';
    };
    window.visualViewport.addEventListener('resize', vvPin);
    window.visualViewport.addEventListener('scroll', vvPin);
  }
}
function backdropTap(){
  if(sheetDismiss){ sheetDismiss(); return; }
  closeSheet();
}
function closeSheet(){
  sheetDismiss = null;
  const s = $('#sheet');
  s.classList.remove('on');
  s.style.bottom = ''; s.style.maxHeight = '';
  $('#sheetBack').classList.remove('on');
  document.body.style.overflow = '';
}

/* ================= self test (?test=1) ================= */
function runSelfTest(){
  const A = (cond, msg) => { if(!cond) throw new Error('SELFTEST FAIL: ' + msg) };
  A(parseJSONLoose('```json\n{"a":1}\n```').a === 1, 'fence strip');
  A(parseJSONLoose('noise {"a":{"b":2}} trailing').a.b === 2, 'loose extract');
  A(qtyLabel({type:'count',n:3}) === '×3', 'qty count label');
  A(qtyLabel({type:'level',v:'half'}) === 'Half', 'qty level label');
  A(qtyLabel({type:'text',label:'juice of 2'}) === 'juice of 2', 'qty text label');
  A(isPourable('lemon juice') && isPourable('Milk') && !isPourable('apple'), 'pourable detect');
  A(foodImgUrl({name:'corn lime pasta salad'}, 256) === foodImgUrl({name:'corn lime pasta salad'}, 256), 'img url deterministic');
  A(recipeImg({name:'x', img:'data:image/jpeg;base64,abc'}, 256) === 'data:image/jpeg;base64,abc', 'stored img wins');
  A(normStep('mix it').text === 'mix it' && normStep({text:'x', tip:'y'}).tip === 'y', 'step normalize');
  const mig = migrateLevels({ name:'m', minutes:5, ingredients:[{item:'a'}], steps:['s'] });
  A(mig.levels.classic.steps[0] === 's' && mig.levels.classic.ingredients[0].item === 'a', 'legacy migrate');
  A(isLow({type:'count',n:1}) && isLow({type:'level',v:'low'}) && !isLow({type:'count',n:2}), 'isLow');
  A(lookupItem('Apples').name === 'apple' && lookupItem('Apples').emoji === '🍎', 'singularize lookup');
  const before = fridge.length;
  addToFridge('__test item__', {type:'count',n:2});
  addToFridge('__test item__', {type:'count',n:1});
  const t = fridge.find(f => f.name === '__test item__');
  A(t && t.qty.n === 3 && fridge.length === before + 1, 'merge add');
  fridge = fridge.filter(f => f.name !== '__test item__'); saveFridge();
  toast('Self-test passed ✅');
}

/* ================= boot ================= */
if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
nav('fridge');
if(location.search.includes('test=1')){
  try{ runSelfTest() }catch(e){ toast(e.message); console.error(e); }
}
